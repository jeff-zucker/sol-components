<link rel="stylesheet" href="../../web/styles/help.css">
<style>
/* Height cascade so the demo bounds the live menu.
   sol-include trusted projects its content via .si-content (light DOM
   sibling of the <slot> in sol-include's shadow). With the include
   itself mounted as a flex item inside the outer sol-menu, each
   successive container declares flex:1 + min-height:0 so the grid at
   the bottom of the chain gets a definite height — which is what
   <sol-menu>'s :host { height: 100% } actually needs to make its own
   .sol-menu-content { overflow: auto } trigger. */
.si-content {
  display: flex;
  flex-direction: column;
  flex: 1 1 0;
  min-height: 0;
  height: 100%;
}
#tab-demo.tab-panel {
  flex: 1 1 0;
  min-height: 0;
}
#tab-demo .demo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 1fr;
  grid-template-areas:
    "code  live"
    "data  live";
  gap: 2rem;
  align-items: stretch;
  height: 100%;
  min-height: 0;
}
#tab-demo .demo-grid > .panel:nth-of-type(1) { grid-area: code; }
#tab-demo .demo-grid > .panel:nth-of-type(2) { grid-area: live; }
#tab-demo .demo-grid > .panel:nth-of-type(3) { grid-area: data; }

.panel { width: auto !important; margin-bottom: 0; overflow: hidden; }

/* Live-menu panel: flex column so its body fills the grid row and
   sol-menu inside has a definite height to fill with height:100%. */
.panel.panel-wide {
  width: auto !important;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.panel.panel-wide > .panel-body {
  flex: 1 1 0;
  min-height: 0;
}
.panel.panel-wide sol-menu {
  display: block;
  height: 100%;
  width: 100%;
}

/* Raw TTL listing: same flex pattern, but with an internal scroll on
   the panel-body since the listing is longer than its grid row. */
#tab-demo .demo-grid > .panel:nth-of-type(3) {
  display: flex;
  flex-direction: column;
  min-height: 0;
}
#tab-demo .demo-grid > .panel:nth-of-type(3) > .panel-body {
  flex: 1 1 0;
  min-height: 0;
  overflow: auto;
}

.panel-body { padding: 0 !important; }
.panel-body pre { margin: 0 !important; padding: 1rem; font-size: .8rem; }
h1 { margin-top: 0 !important; margin-bottom: 0.25rem; }
p { margin-top: 0; }
</style>

<h1>sol-menu</h1>
<p>Sidebar or top-strip navigation; entries can be anchors or RDF-driven.</p>
